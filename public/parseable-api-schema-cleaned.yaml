openapi: 3.0.0
info:
  title: Parseable API
  version: 1.0.0
  description: |-
    Core APIs for Parseable - a simplified version of the API schema with only essential endpoints.
servers:
  - url: '{protocol}://{host}:{port}'
    variables:
      protocol:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost
      port:
        default: '8000'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
security:
  - basicAuth: []
paths:
  /api/v1/logstream/{stream_name}:
    put:
      tags:
        - Dataset Management
      summary: Create a dataset
      operationId: createLogStream
      description: |
        Create a dataset in Parseable using the dataset name in the path.
        This endpoint is used for stream creation before writing JSON events directly to `/api/v1/logstream/{stream_name}`.
      security:
        - basicAuth: []
      parameters:
        - name: stream_name
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Dataset Management
      summary: Delete a dataset
      operationId: deleteLogStream
      description: |
        Delete an existing dataset.
        When a dataset is deleted, all associated data is permanently removed.
      security:
        - basicAuth: []
      parameters:
        - name: stream_name
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Dataset Management
      summary: Send JSON events to a dataset
      operationId: sendLogsToStream
      description: |
        Send JSON events directly to an existing dataset.
        The destination dataset is taken from the `{stream_name}` path parameter, so no `X-P-Stream` header is needed.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                - id: 434a5f5e-2f5f-11ed-a261-asdasdafgdfd
                  datetime: 24/Jun/2022:14:12:15 +0000
                  host: 153.10.110.81
                  user-identifier: >-
                    Mozilla/5.0 (Windows NT 6.1; Win64; x64; rv:64.0)
                    Gecko/20100101 Firefox/64.0
                  method: PUT
                  status: 500
                  referrer: http://www.google.com/
      security:
        - basicAuth: []
      parameters:
        - name: stream_name
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/query:
    post:
      tags:
        - Query
      summary: Query a dataset with SQL
      operationId: queryLogStream
      description: |
        Run a SQL query in Parseable.
        The dataset is selected inside the SQL statement itself, typically in the `FROM` clause.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - query
                - startTime
                - endTime
              properties:
                query:
                  type: string
                startTime:
                  type: string
                endTime:
                  type: string
                sendNull:
                  type: boolean
                streaming:
                  type: boolean
              example:
                query: SELECT * FROM "example-dataset" WHERE level = 'error'
                startTime: "2023-01-01T00:00:00Z"
                endTime: "2023-01-01T23:59:59Z"
                sendNull: false
                streaming: false
      security:
        - basicAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/ingest:
    post:
      tags:
        - JSON Ingestion
      summary: Ingest JSON events with headers
      operationId: ingestLogsWithHeaders
      description: |
        Ingest JSON events and route them with request headers.
        Use `X-P-Stream` to specify the destination dataset.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                level: info
                message: User logged in
                timestamp: "2023-01-01T12:00:00Z"
                user_id: user123
      security:
        - basicAuth: []
      parameters:
        - name: X-P-Stream
          in: header
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/logs:
    post:
      tags:
        - OTLP Ingestion
      summary: Ingest OTLP logs
      operationId: ingestOtlpLogs
      description: |
        Ingest OpenTelemetry logs through Parseable's native OTLP logs endpoint.
        Use `X-P-Stream` to choose the destination dataset and `X-P-Log-Source: otel-logs` to identify the payload type.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      security:
        - basicAuth: []
      parameters:
        - name: X-P-Stream
          in: header
          schema:
            type: string
          required: true
        - name: X-P-Log-Source
          in: header
          schema:
            type: string
            enum:
              - otel-logs
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/traces:
    post:
      tags:
        - OTLP Ingestion
      summary: Ingest OTLP traces
      operationId: ingestOtlpTraces
      description: |
        Ingest OpenTelemetry traces through Parseable's native OTLP traces endpoint.
        Use `X-P-Stream` to choose the destination dataset and `X-P-Log-Source: otel-traces` to identify the payload type.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      security:
        - basicAuth: []
      parameters:
        - name: X-P-Stream
          in: header
          schema:
            type: string
          required: true
        - name: X-P-Log-Source
          in: header
          schema:
            type: string
            enum:
              - otel-traces
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/metrics:
    post:
      tags:
        - OTLP Ingestion
      summary: Ingest OTLP metrics
      operationId: ingestOtlpMetrics
      description: |
        Ingest OpenTelemetry metrics through Parseable's native OTLP metrics endpoint.
        Use `X-P-Stream` to choose the destination dataset and `X-P-Log-Source: otel-metrics` to identify the payload type.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      security:
        - basicAuth: []
      parameters:
        - name: X-P-Stream
          in: header
          schema:
            type: string
          required: true
        - name: X-P-Log-Source
          in: header
          schema:
            type: string
            enum:
              - otel-metrics
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/prometheus/write:
    post:
      tags:
        - Prometheus Remote Write
      summary: Ingest Prometheus remote write metrics
      operationId: prometheusRemoteWrite
      description: |
        Ingest metrics using the Prometheus Remote Write protocol.
        This endpoint accepts snappy-compressed protobuf payloads and routes the converted metrics into the target dataset.
      security:
        - basicAuth: []
      parameters:
        - name: Content-Encoding
          in: header
          schema:
            type: string
            enum:
              - snappy
          required: true
        - name: X-P-Stream
          in: header
          schema:
            type: string
          required: true
        - name: X-P-Log-Source
          in: header
          schema:
            type: string
            enum:
              - otel-metrics
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
